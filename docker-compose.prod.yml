services:
  postgres:
    image: postgres:15-alpine
    container_name: flexstock-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flexstock}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - flexstock-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flexstock-server-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-flexstock}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      APP_NAME: ${APP_NAME:-FlexStock}
      APP_URL: ${APP_URL}
      PORT: 3000
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-PKR}
    volumes:
      - uploads_prod:/app/uploads
      - settings_prod:/app/settings.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flexstock-network
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: flexstock-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
      - nginx_certs:/etc/letsencrypt
    depends_on:
      - server
    networks:
      - flexstock-network
    restart: unless-stopped

volumes:
  pgdata_prod:
  uploads_prod:
  settings_prod:
  nginx_certs:

networks:
  flexstock-network:
    driver: bridge
